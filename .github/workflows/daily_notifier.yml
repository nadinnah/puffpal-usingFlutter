name: 🌦️ Daily Weather Notifier

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  send-weather-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            npm install node-fetch@2 firebase-admin dotenv
          fi

      - name: Run weather notification script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node .github/scripts/weatherNotifier.js